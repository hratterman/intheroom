<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>In The Room</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #181818;
      --border: #252525;
      --text: #f0f0f0;
      --muted: #666;
      --accent: #e2ff5d;
    }

    body {
      width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
      padding: 18px;
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 14px;
    }

    .logo span { color: var(--accent); }

    .hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      background: var(--accent);
      color: #000;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.88; }

    .note {
      margin-top: 12px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="logo">in the <span>room</span></div>
  <div class="hint">Opens the side panel where you can start listening and launch the floating transcript window.</div>
  <button class="btn" id="open-btn">Open Side Panel</button>
  <div class="note">Works on Google Meet, Teams, and Zoom in browser.</div>

  <script>
    document.getElementById('open-btn').addEventListener('click', function() {
      // Must get the real window ID first -- WINDOW_ID_CURRENT (-2) doesn't work in popups
      chrome.windows.getCurrent(function(win) {
        chrome.sidePanel.open({ windowId: win.id }).then(function() {
          window.close();
        }).catch(function() {
          // Fallback: open as tab
          chrome.tabs.create({ url: chrome.runtime.getURL('sidepanel.html') });
          window.close();
        });
      });
    });
  </script>
</body>
</html>
