<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>In The Room</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #242424;
      --text: #f0f0f0;
      --muted: #555;
      --dim: #333;
      --accent: #e2ff5d;
      --accent-dim: rgba(226,255,93,0.08);
      --green: #5fff8f;
      --red: #ff5f5f;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .logo span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
    }

    .status-badge.listening { color: var(--green); }
    .status-badge.listening .dot { background: var(--green); animation: pulse 1.5s ease-in-out infinite; }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Controls */
    .controls {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .btn-primary { background: var(--accent); color: #000; }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(255,95,95,0.4); }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

    /* Stats row */
    .stats {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .stat {
      flex: 1;
      background: var(--bg);
      padding: 10px;
      text-align: center;
    }

    .stat-num {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-top: 1px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      background: none;
      border: none;
      padding: 9px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Transcript */
    #transcript-view {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
    }

    #transcript-view::-webkit-scrollbar { width: 4px; }
    #transcript-view::-webkit-scrollbar-track { background: transparent; }
    #transcript-view::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    .transcript-line {
      padding: 6px 0;
      line-height: 1.55;
      border-bottom: 1px solid var(--border);
    }

    .transcript-line:last-child { border-bottom: none; }

    .transcript-line.interim {
      color: var(--muted);
      font-style: italic;
    }

    .transcript-ts {
      font-size: 10px;
      color: var(--dim);
      margin-bottom: 2px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: var(--muted);
      gap: 8px;
      padding: 30px 20px;
    }

    .empty-icon { font-size: 32px; }
    .empty-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .empty-sub { font-size: 12px; line-height: 1.5; }

    /* Summary */
    #summary-view {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: none;
    }

    .summary-section { margin-bottom: 14px; }

    .summary-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .summary-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.6;
    }

    .summary-loading {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 30px 20px;
      line-height: 1.5;
    }

    .summary-timer {
      font-size: 11px;
      color: var(--dim);
      text-align: right;
      margin-top: 8px;
    }

    /* Footer */
    .footer {
      border-top: 1px solid var(--border);
      padding: 10px 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .word-count { font-size: 11px; color: var(--dim); }
    .word-count span { color: var(--muted); }

    .copy-btn {
      background: var(--accent-dim);
      border: 1px solid rgba(226,255,93,0.2);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .copy-btn:hover { background: var(--accent); color: #000; }
    .copy-btn.copied { background: var(--green); border-color: var(--green); color: #000; }

    #error-msg {
      margin: 10px 16px 0;
      padding: 10px 12px;
      background: rgba(255,95,95,0.08);
      border: 1px solid rgba(255,95,95,0.25);
      border-radius: 8px;
      color: var(--red);
      font-size: 12px;
      line-height: 1.4;
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="logo">in the <span>room</span></div>
      <div class="header-right">
        <div class="status-badge" id="status-badge">
          <div class="dot"></div>
          <span id="status-text">Idle</span>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="main-btn">Start Listening</button>
      <button class="btn btn-secondary" id="pip-btn" style="flex:0;padding:10px 14px;" title="Open floating panel">&#8599;</button>
    </div>

    <div id="error-msg"></div>

    <div class="stats" id="stats" style="display:none;">
      <div class="stat">
        <div class="stat-num" id="stat-words">0</div>
        <div class="stat-label">Words</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-time">0:00</div>
        <div class="stat-label">Duration</div>
      </div>
    </div>

    <div class="tabs" id="tabs" style="display:none;">
      <button class="tab active" data-tab="transcript">Transcript</button>
      <button class="tab" data-tab="summary">Summary</button>
    </div>

    <div id="transcript-view">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🎙</div>
        <div class="empty-title">Ready to listen</div>
        <div class="empty-sub">Click Start Listening, then speak.<br>Your words appear here in real time.</div>
      </div>
      <div id="transcript-lines"></div>
    </div>

    <div id="summary-view">
      <div class="summary-loading" id="summary-loading">
        Summary updates every 2 minutes once transcription starts.
      </div>
      <div id="summary-content" style="display:none;">
        <div class="summary-section">
          <div class="summary-label">So far</div>
          <div class="summary-content" id="summary-text"></div>
        </div>
        <div class="summary-timer" id="summary-timer"></div>
      </div>
    </div>

    <div class="footer">
      <div class="word-count">
        <span id="word-count-num">0</span> words
      </div>
      <button class="copy-btn" id="copy-btn">Copy transcript</button>
    </div>
  </div>

  <script>
    var active = false;
    var wordCount = 0;
    var startTime = null;
    var timerInterval = null;
    var recognition = null;
    var summarizer = null;
    var summaryInterval = null;
    var finalLines = [];
    var currentTab = 'transcript';
    var interimEl = null;
    var pipRef = null;

    // Tab switching
    document.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        document.getElementById('transcript-view').style.display = currentTab === 'transcript' ? 'block' : 'none';
        document.getElementById('summary-view').style.display = currentTab === 'summary' ? 'block' : 'none';
      });
    });

    // Main button
    document.getElementById('main-btn').addEventListener('click', function() {
      if (active) {
        stopListening();
      } else {
        startListening();
      }
    });

    // PiP button
    document.getElementById('pip-btn').addEventListener('click', function() {
      openPip();
    });

    // Copy button
    document.getElementById('copy-btn').addEventListener('click', function() {
      var text = finalLines.join('\n\n');
      if (!text) return;
      navigator.clipboard.writeText(text).then(function() {
        var btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = 'Copy transcript';
          btn.classList.remove('copied');
        }, 2000);
      });
    });

    function startListening() {
      showError(null);

      if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        showError('Speech recognition not supported. Use Chrome.');
        return;
      }

      var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onstart = function() {
        setActive(true);
      };

      recognition.onresult = function(event) {
        var interim = '';
        for (var i = event.resultIndex; i < event.results.length; i++) {
          var result = event.results[i];
          if (result.isFinal) {
            var text = result[0].transcript.trim();
            if (text) {
              finalLines.push(text);
              wordCount += text.split(/\s+/).length;
              appendLine(text, false);
              updateWordCount();
              notifyBackground(text, true);
            }
          } else {
            interim += result[0].transcript;
          }
        }
        updateInterim(interim);
        if (interim) notifyBackground(interim, false);
      };

      recognition.onerror = function(event) {
        if (event.error === 'no-speech') return;
        if (event.error === 'not-allowed') {
          showError('Microphone access denied. Allow mic access and try again.');
          setActive(false);
          return;
        }
        appendLine('[Error: ' + event.error + ']', true);
      };

      recognition.onend = function() {
        // Auto-restart if still active
        if (active) {
          try { recognition.start(); } catch(e) {}
        }
      };

      recognition.start();
    }

    function stopListening() {
      if (recognition) {
        recognition.onend = null;
        recognition.stop();
        recognition = null;
      }
      if (summaryInterval) { clearInterval(summaryInterval); summaryInterval = null; }
      setActive(false);
      chrome.runtime.sendMessage({ type: 'SESSION_STOPPED' }).catch(function() {});
    }

    function notifyBackground(text, isFinal) {
      chrome.runtime.sendMessage({ type: 'TRANSCRIPT_LINE', text: text, isFinal: isFinal }).catch(function() {});
    }

    // PiP window (display only)
    function openPip() {
      if (typeof window.documentPictureInPicture === 'undefined') {
        showError('Document PiP requires Chrome 116+.');
        return;
      }
      if (pipRef && !pipRef.closed) { pipRef.focus(); return; }

      window.documentPictureInPicture.requestWindow({
        width: 380,
        height: 520,
        disallowReturnToOpener: false
      }).then(function(pipWin) {
        pipRef = pipWin;

        fetch(chrome.runtime.getURL('pip.html'))
          .then(function(r) { return r.text(); })
          .then(function(html) {
            pipWin.document.open();
            pipWin.document.write(html);
            pipWin.document.close();

            // Replay existing transcript into PiP
            setTimeout(function() {
              if (typeof pipWin.replayTranscript === 'function') {
                pipWin.replayTranscript(finalLines);
              }
            }, 200);
          });

        pipWin.addEventListener('pagehide', function() { pipRef = null; });
      }).catch(function(e) {
        showError('Could not open floating panel: ' + e.message);
      });
    }

    // Forward background messages to PiP
    chrome.runtime.onMessage.addListener(function(msg) {
      if (!pipRef || pipRef.closed) return;
      if (msg.type === 'TRANSCRIPT_LINE' && typeof pipRef.receiveTranscriptLine === 'function') {
        pipRef.receiveTranscriptLine(msg.text, msg.isFinal);
      }
      if (msg.type === 'SUMMARY_UPDATE' && typeof pipRef.receiveSummary === 'function') {
        pipRef.receiveSummary(msg.summary);
      }
    });

    // Summarizer (runs in side panel)
    async function initSummarizer() {
      try {
        if (window.ai && window.ai.summarizer) {
          var cap = await window.ai.summarizer.capabilities();
          if (cap.available !== 'no') {
            summarizer = await window.ai.summarizer.create({
              type: 'tl;dr',
              format: 'plain-text',
              length: 'medium'
            });
          }
        }
      } catch(e) { summarizer = null; }

      summaryInterval = setInterval(function() {
        if (finalLines.length > 0) runSummary();
      }, 120000);
    }

    async function runSummary() {
      var text = finalLines.join(' ');
      if (text.split(' ').length < 30) return;
      try {
        var summary = summarizer
          ? await summarizer.summarize(text)
          : extractiveSummary(text);
        chrome.runtime.sendMessage({ type: 'SUMMARY_UPDATE', summary: summary }).catch(function() {});
        // Also update local summary view
        document.getElementById('summary-loading').style.display = 'none';
        document.getElementById('summary-content').style.display = 'block';
        document.getElementById('summary-text').textContent = summary;
        document.getElementById('summary-timer').textContent = 'Last updated ' + formatTime(new Date());
      } catch(e) {
        var s = extractiveSummary(text);
        document.getElementById('summary-text').textContent = s;
      }
    }

    function extractiveSummary(text) {
      var sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
      if (sentences.length <= 3) return sentences.join(' ');
      return [
        sentences[0],
        sentences[Math.floor(sentences.length / 2)],
        sentences[sentences.length - 1]
      ].join(' ');
    }

    // UI helpers
    function setActive(isActive) {
      active = isActive;
      var btn = document.getElementById('main-btn');
      var badge = document.getElementById('status-badge');
      var statusText = document.getElementById('status-text');

      if (isActive) {
        btn.textContent = 'Stop';
        btn.className = 'btn btn-danger';
        badge.className = 'status-badge listening';
        statusText.textContent = 'Listening';
        document.getElementById('stats').style.display = 'flex';
        document.getElementById('tabs').style.display = 'flex';
        document.getElementById('empty-state').style.display = 'none';
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
        initSummarizer();
        chrome.runtime.sendMessage({ type: 'SESSION_STARTED' }).catch(function() {});
      } else {
        btn.textContent = 'Start Listening';
        btn.className = 'btn btn-primary';
        badge.className = 'status-badge';
        statusText.textContent = 'Idle';
        clearInterval(timerInterval);
        startTime = null;
      }
    }

    function appendLine(text, isError) {
      if (interimEl) { interimEl.remove(); interimEl = null; }
      var container = document.getElementById('transcript-lines');
      var line = document.createElement('div');
      line.className = 'transcript-line' + (isError ? ' interim' : '');
      var ts = document.createElement('div');
      ts.className = 'transcript-ts';
      ts.textContent = formatTime(new Date());
      line.appendChild(ts);
      line.appendChild(document.createTextNode(text));
      container.appendChild(line);
      var view = document.getElementById('transcript-view');
      view.scrollTop = view.scrollHeight;
    }

    function updateInterim(text) {
      var container = document.getElementById('transcript-lines');
      if (!text) {
        if (interimEl) { interimEl.remove(); interimEl = null; }
        return;
      }
      if (!interimEl) {
        interimEl = document.createElement('div');
        interimEl.className = 'transcript-line interim';
        container.appendChild(interimEl);
      }
      interimEl.textContent = text;
      document.getElementById('transcript-view').scrollTop = document.getElementById('transcript-view').scrollHeight;
    }

    function updateWordCount() {
      document.getElementById('word-count-num').textContent = wordCount.toLocaleString();
    }

    function updateTimer() {
      if (!startTime) return;
      var elapsed = Math.floor((Date.now() - startTime) / 1000);
      var m = Math.floor(elapsed / 60);
      var s = elapsed % 60;
      document.getElementById('stat-time').textContent = m + ':' + (s < 10 ? '0' : '') + s;
      document.getElementById('stat-words').textContent = wordCount.toLocaleString();
    }

    function formatTime(date) {
      var h = date.getHours();
      var m = date.getMinutes().toString().padStart(2, '0');
      var ampm = h >= 12 ? 'pm' : 'am';
      h = h % 12 || 12;
      return h + ':' + m + ' ' + ampm;
    }

    function showError(msg) {
      var el = document.getElementById('error-msg');
      el.style.display = msg ? 'block' : 'none';
      el.textContent = msg || '';
    }
  </script>
</body>
</html>
