<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>In The Room</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #242424;
      --text: #f0f0f0;
      --muted: #555;
      --dim: #333;
      --accent: #e2ff5d;
      --accent-dim: rgba(226,255,93,0.1);
      --green: #5fff8f;
      --red: #ff5f5f;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header */
    .pip-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .pip-logo {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .pip-logo span { color: var(--accent); }

    .listening-badge {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--green);
      font-weight: 600;
    }

    .listening-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      background: none;
      border: none;
      padding: 9px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Transcript */
    #transcript-view {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
    }

    #transcript-view::-webkit-scrollbar { width: 4px; }
    #transcript-view::-webkit-scrollbar-track { background: transparent; }
    #transcript-view::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    .transcript-line {
      padding: 5px 0;
      line-height: 1.55;
      border-bottom: 1px solid var(--border);
    }

    .transcript-line:last-child { border-bottom: none; }
    .transcript-line.interim { color: var(--muted); font-style: italic; }

    .transcript-ts {
      font-size: 10px;
      color: var(--dim);
      margin-bottom: 2px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: var(--muted);
      gap: 8px;
      padding: 20px;
    }

    .empty-icon { font-size: 28px; }
    .empty-title { font-size: 13px; font-weight: 500; color: var(--text); }
    .empty-sub { font-size: 12px; line-height: 1.5; }

    /* Summary */
    #summary-view {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: none;
    }

    .summary-section { margin-bottom: 14px; }

    .summary-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .summary-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.6;
    }

    .summary-loading {
      color: var(--muted);
      font-style: italic;
      font-size: 12px;
      text-align: center;
      padding: 20px;
    }

    .summary-timer {
      font-size: 11px;
      color: var(--dim);
      text-align: right;
      margin-top: 8px;
    }

    /* Footer */
    .pip-footer {
      border-top: 1px solid var(--border);
      padding: 10px 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .word-count { font-size: 11px; color: var(--dim); }
    .word-count span { color: var(--muted); }

    .copy-btn {
      background: var(--accent-dim);
      border: 1px solid rgba(226,255,93,0.2);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .copy-btn:hover { background: var(--accent); color: #000; }
    .copy-btn.copied { background: var(--green); border-color: var(--green); color: #000; }
  </style>
</head>
<body>
  <div id="app">
    <div class="pip-header">
      <div class="pip-logo">in the <span>room</span></div>
      <div class="listening-badge" id="listening-badge">
        <div class="listening-dot"></div>
        Listening
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="transcript">Transcript</button>
      <button class="tab" data-tab="summary">Summary</button>
    </div>

    <div id="transcript-view">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🎙</div>
        <div class="empty-title">Waiting for audio</div>
        <div class="empty-sub">Start listening in the side panel<br>and your words appear here.</div>
      </div>
      <div id="transcript-lines"></div>
    </div>

    <div id="summary-view">
      <div class="summary-loading" id="summary-loading">
        Summary updates every 2 minutes.
      </div>
      <div id="summary-content" style="display:none;">
        <div class="summary-section">
          <div class="summary-label">So far</div>
          <div class="summary-content" id="summary-text"></div>
        </div>
        <div class="summary-timer" id="summary-timer"></div>
      </div>
    </div>

    <div class="pip-footer">
      <div class="word-count">
        <span id="word-count-num">0</span> words
      </div>
      <button class="copy-btn" id="copy-btn">Copy transcript</button>
    </div>
  </div>

  <script>
    var finalLines = [];
    var wordCount = 0;
    var interimEl = null;
    var currentTab = 'transcript';

    // Tab switching
    document.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        document.getElementById('transcript-view').style.display = currentTab === 'transcript' ? 'block' : 'none';
        document.getElementById('summary-view').style.display = currentTab === 'summary' ? 'block' : 'none';
      });
    });

    // Copy button
    document.getElementById('copy-btn').addEventListener('click', function() {
      var text = finalLines.join('\n\n');
      if (!text) return;
      navigator.clipboard.writeText(text).then(function() {
        var btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = 'Copy transcript';
          btn.classList.remove('copied');
        }, 2000);
      });
    });

    // Called from sidepanel when PiP opens with existing content
    window.replayTranscript = function(lines) {
      lines.forEach(function(text) { appendFinalLine(text); });
    };

    // Called from sidepanel as new lines arrive
    window.receiveTranscriptLine = function(text, isFinal) {
      if (isFinal) {
        appendFinalLine(text);
      } else {
        updateInterim(text);
      }
    };

    // Called from sidepanel when summary updates
    window.receiveSummary = function(summary) {
      document.getElementById('summary-loading').style.display = 'none';
      document.getElementById('summary-content').style.display = 'block';
      document.getElementById('summary-text').textContent = summary;
      document.getElementById('summary-timer').textContent = 'Last updated ' + formatTime(new Date());
    };

    function appendFinalLine(text) {
      document.getElementById('listening-badge').style.display = 'flex';
      document.getElementById('empty-state').style.display = 'none';
      if (interimEl) { interimEl.remove(); interimEl = null; }
      finalLines.push(text);
      wordCount += text.split(/\s+/).length;
      document.getElementById('word-count-num').textContent = wordCount.toLocaleString();

      var container = document.getElementById('transcript-lines');
      var line = document.createElement('div');
      line.className = 'transcript-line';
      var ts = document.createElement('div');
      ts.className = 'transcript-ts';
      ts.textContent = formatTime(new Date());
      line.appendChild(ts);
      line.appendChild(document.createTextNode(text));
      container.appendChild(line);
      var view = document.getElementById('transcript-view');
      view.scrollTop = view.scrollHeight;
    }

    function updateInterim(text) {
      document.getElementById('empty-state').style.display = 'none';
      var container = document.getElementById('transcript-lines');
      if (!text) {
        if (interimEl) { interimEl.remove(); interimEl = null; }
        return;
      }
      if (!interimEl) {
        interimEl = document.createElement('div');
        interimEl.className = 'transcript-line interim';
        container.appendChild(interimEl);
      }
      interimEl.textContent = text;
      document.getElementById('transcript-view').scrollTop = document.getElementById('transcript-view').scrollHeight;
    }

    function formatTime(date) {
      var h = date.getHours();
      var m = date.getMinutes().toString().padStart(2, '0');
      var ampm = h >= 12 ? 'pm' : 'am';
      h = h % 12 || 12;
      return h + ':' + m + ' ' + ampm;
    }
  </script>
</body>
</html>
